name: Proto Contract

on:
  push:
    paths:
      - "api/proto/**"
      - "buf.yaml"
      - "buf.gen.yaml"
      - ".github/workflows/proto-contract.yml"
  pull_request:
    paths:
      - "api/proto/**"
      - "buf.yaml"
      - "buf.gen.yaml"
      - ".github/workflows/proto-contract.yml"

permissions:
  contents: read

concurrency:
  group: proto-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proto-contract:
    name: Lint, Breaking, Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.54.0"

      - name: Install Go proto plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Lint protobuf schema
        run: buf lint

      - name: Check breaking changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            buf breaking --against '.git#branch=main'
          else
            buf breaking --against '.git#ref=HEAD~1'
          fi

      - name: Regenerate and check for drift
        run: |
          buf generate
          git diff --exit-code -- api/proto/ahv1/
