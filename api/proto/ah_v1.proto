syntax = "proto3";

// Field number assignment rules (enforced from first consumer integration):
//   - Field numbers must never be reused within a message, even if the original field is removed.
//   - Removing a field requires reserving its number: reserve 3; reserve "old_field_name";
//   - Breaking changes require a new package (ah.v2) or an explicit pre-v1 reset documented in git.
//   - See docs/CONTRACT_OWNERSHIP.md for the full contract policy.

package ah.v1;

option go_package = "github.com/HeaInSeo/artifact-handoff/api/proto/ahv1";

message ArtifactRef {
  string sample_run_id = 1;
  string producer_node_id = 2;
  string output_name = 3;
  string artifact_id = 4;
  string digest = 5;
  string node_name = 6;
  string uri = 7;
  int64 size_bytes = 8;
  string producer_attempt_id = 9;
  string logical_uri = 10;
  repeated ArtifactLocation locations = 11;
}

message RegisterArtifactRequest {
  ArtifactRef artifact = 1;
}

message RegisterArtifactResponse {
  string availability_state = 1;
}

message ArtifactBinding {
  string binding_name = 1;
  string sample_run_id = 2;
  string child_node_id = 3;
  string child_input_name = 4;
  string producer_node_id = 5;
  string producer_output_name = 6;
  string consume_policy = 7;
  bool required = 8;
  string expected_digest = 9;
  string artifact_id = 10;
  string producer_attempt_id = 11;
  string child_attempt_id = 12;
}

message ResolveHandoffRequest {
  ArtifactBinding binding = 1;
  string target_node_name = 2;
}

message PlacementIntent {
  string mode = 1;
  string node_name = 2;
}

message NodeLocalLocation {
  string node_name = 1;
  string path = 2;
}

message HttpSource {
  string uri = 1;
}

message ArtifactLocation {
  oneof backend {
    NodeLocalLocation node_local = 1;
    HttpSource http = 2;
  }
}

message ArtifactSource {
  string source_id = 1;
  string artifact_id = 2;
  string backend_id = 3;
  string digest = 4;
  string state = 5;
  string location_fingerprint = 6;
  ArtifactLocation location = 7;
  string last_verified_at = 8;
  string last_error = 9;
}

message AddSourceRequest {
  string artifact_id = 1;
  ArtifactSource source = 2;
}

message AddSourceResponse {
  ArtifactSource source = 1;
}

message UpdateSourceStateRequest {
  string source_id = 1;
  string state = 2;
}

message UpdateSourceStateResponse {
  ArtifactSource source = 1;
}

message ListSourcesRequest {
  string artifact_id = 1;
}

message ListSourcesResponse {
  repeated ArtifactSource sources = 1;
}

message VerifySourceRequest {
  string source_id = 1;
}

message VerifySourceResponse {
  ArtifactSource source = 1;
  bool verified = 2;
  string reason = 3;
}

message MaterializationPlan {
  string mode = 1;
  string uri = 2;
  string expected_digest = 3;
  int64 expected_size_bytes = 4;
  ArtifactLocation source_location = 5;
  string local_path = 6;
}

message MaterializationCondition {
  string kind = 1;
  string node_name = 2;
  string backend_id = 3;
  string source_ref = 4;
  string state = 5;
}

message MaterializationCandidate {
  int32 priority = 1;
  string mode = 2;
  string source_ref = 3;
  string expected_digest = 4;
  int64 expected_size_bytes = 5;
  string local_path = 6;
  ArtifactLocation source_location = 7;
  string uri = 8;
  repeated MaterializationCondition conditions = 9;
}

message ResolveHandoffResponse {
  // Field numbers 3–5 were reassigned during the pre-v1 reset (commit b829ed9).
  // Reserve the old field names so the compiler blocks accidental reuse.
  reserved "source_node_name", "artifact_uri", "requires_materialization";

  string resolution_status = 1;
  string decision = 2;
  PlacementIntent placement_intent = 3;
  MaterializationPlan materialization_plan = 4;
  string reason = 5;
  bool retryable = 6;
  repeated MaterializationCandidate materialization_candidates = 7;
}

message NotifyNodeTerminalRequest {
  string sample_run_id = 1;
  string node_id = 2;
  string terminal_state = 3;
  string attempt_id = 4;
}

message NotifyNodeTerminalResponse {
  bool accepted = 1;
}

message FinalizeSampleRunRequest {
  string sample_run_id = 1;
}

message FinalizeSampleRunResponse {
  bool accepted = 1;
}

message EvaluateGCRequest {
  string sample_run_id = 1;
}

message EvaluateGCResponse {
  bool accepted = 1;
}

message GetSampleRunLifecycleRequest {
  string sample_run_id = 1;
}

message GetSampleRunLifecycleResponse {
  string sample_run_id = 1;
  bool finalized = 2;
  string finalized_at = 3;
  string retention_policy_source = 4;
  string retention_duration = 5;
  string retention_until = 6;
  bool gc_eligible = 7;
  string gc_eligible_at = 8;
  string gc_blocked_reason = 9;
  int32 terminal_node_count = 10;
  int32 succeeded_node_count = 11;
  int32 failed_node_count = 12;
  int32 canceled_node_count = 13;
  int32 retained_artifact_count = 14;
  int64 retained_artifact_bytes = 15;
}

service ArtifactHandoffResolver {
  rpc RegisterArtifact(RegisterArtifactRequest) returns (RegisterArtifactResponse);
  rpc AddSource(AddSourceRequest) returns (AddSourceResponse);
  rpc UpdateSourceState(UpdateSourceStateRequest) returns (UpdateSourceStateResponse);
  rpc ListSources(ListSourcesRequest) returns (ListSourcesResponse);
  rpc VerifySource(VerifySourceRequest) returns (VerifySourceResponse);
  rpc ResolveHandoff(ResolveHandoffRequest) returns (ResolveHandoffResponse);
  rpc NotifyNodeTerminal(NotifyNodeTerminalRequest) returns (NotifyNodeTerminalResponse);
  rpc FinalizeSampleRun(FinalizeSampleRunRequest) returns (FinalizeSampleRunResponse);
  rpc EvaluateGC(EvaluateGCRequest) returns (EvaluateGCResponse);
  rpc GetSampleRunLifecycle(GetSampleRunLifecycleRequest) returns (GetSampleRunLifecycleResponse);
}
