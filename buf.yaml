version: v2

modules:
  - path: api/proto

lint:
  # MINIMAL enforces basic proto hygiene (syntax, package naming, file naming).
  # PACKAGE_DIRECTORY_MATCH is excluded because the current layout keeps the proto
  # at api/proto/ah_v1.proto rather than api/proto/ah/v1/ah_v1.proto.
  # Restructure to ah/v1/ and remove this exception when cutting the v1 release.
  use:
    - MINIMAL
  except:
    - PACKAGE_DIRECTORY_MATCH

breaking:
  # WIRE_JSON catches all wire-format and JSON-mapping breaking changes:
  # deleted fields, changed field numbers, changed types, deleted RPCs.
  use:
    - WIRE_JSON
