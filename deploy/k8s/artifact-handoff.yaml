apiVersion: v1
kind: ServiceAccount
metadata:
  name: artifact-handoff
# imagePullSecrets are not set in the base manifest.
# Add them via a kustomize overlay when pulling from a private registry.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: artifact-handoff
spec:
  replicas: 1
  selector:
    matchLabels:
      app: artifact-handoff
  template:
    metadata:
      labels:
        app: artifact-handoff
    spec:
      serviceAccountName: artifact-handoff
      containers:
        - name: artifact-handoff
          image: artifact-handoff-image:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: grpc
          env:
            - name: AH_ADDR
              value: ":8080"
            - name: AH_GRPC_ADDR
              value: ":9090"
            # AH_STORE_DSN selects the persistence backend.
            # "memory"        — in-memory only, state lost on restart (default)
            # "sqlite:/data/ah.db" — SQLite file, survives restarts when /data is persistent
            #
            # For ephemeral dev use (emptyDir below) restarts lose state but the process
            # survives within a single Pod lifetime.
            # For production use a PersistentVolumeClaim and point this at a stable path.
            - name: AH_STORE_DSN
              value: "sqlite:/data/ah.db"
          volumeMounts:
            - name: ah-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
      volumes:
        - name: ah-data
          # emptyDir: state is preserved across container restarts within the same Pod,
          # but lost when the Pod is rescheduled.
          # Replace with a PersistentVolumeClaim for durable production deployments.
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: artifact-handoff
spec:
  selector:
    app: artifact-handoff
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 9090
      targetPort: grpc
